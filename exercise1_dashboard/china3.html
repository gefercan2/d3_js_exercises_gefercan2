<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Global Financial Centers Dashboard</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson@3"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #222;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .header {
    background: #0b3d91;
    color: #FFD700;
    padding: 15px;
    text-align: center;
    border-bottom: 2px solid #FFD700;
    font-weight: bold;
    font-size: 18px;
  }
  .dashboard {
    display: flex;
    flex: 1;
    gap: 15px;
    padding: 15px;
    overflow: hidden;
  }
  .left-section {
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 15px;
  }
  .right-section {
    display: flex;
    flex-direction: column;
    width: 380px;
    gap: 15px;
    overflow-y: auto;
  }
  .globe-container {
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 4px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex: 1;
  }
  .chart-container {
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 15px;
    flex: 1;
    overflow-y: auto;
  }
  .chart-title {
    color: #FFD700;
    font-weight: bold;
    margin-bottom: 12px;
    font-size: 13px;
  }
  .chart-item {
    margin-bottom: 10px;
    padding: 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .chart-item:hover {
    background: #0b3d91;
  }
  .chart-item.active {
    background: #FFD700;
    color: #1a1a1a;
  }
  .chart-item.active .chart-label {
    color: #1a1a1a;
  }
  .chart-item.active .chart-value {
    color: #1a1a1a;
  }
  .chart-label {
    color: #ccc;
    font-size: 11px;
    margin-bottom: 4px;
  }
  .chart-bar {
    height: 16px;
    background: linear-gradient(90deg, #FFD700, #FFA500);
    border-radius: 2px;
    position: relative;
  }
  .chart-value {
    color: #ccc;
    font-size: 10px;
    margin-left: 4px;
    position: absolute;
    top: 0;
    right: -50px;
    width: 45px;
    text-align: right;
  }
  .fever-container {
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 15px;
    display: flex;
    flex-direction: column;
    height: 280px;
  }
  .fever-title {
    color: #FFD700;
    font-weight: bold;
    margin-bottom: 10px;
    font-size: 13px;
  }
  .fever-chart {
    flex: 1;
  }
  .info-container {
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 15px;
  }
  .time-box {
    background: #0b3d91;
    border: 1px solid #FFD700;
    padding: 12px;
    border-radius: 4px;
    text-align: center;
    margin-bottom: 12px;
  }
  .time-label {
    color: #ccc;
    font-size: 10px;
    margin-bottom: 6px;
  }
  .time-display {
    color: #FFD700;
    font-weight: bold;
    font-size: 20px;
    font-family: monospace;
  }
  .info-title {
    color: #FFD700;
    font-weight: bold;
    font-size: 13px;
    margin-bottom: 10px;
  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    color: #ccc;
    font-size: 11px;
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .detail-label {
    font-weight: bold;
    color: #FFD700;
    min-width: 75px;
  }
  svg {
    cursor: grab;
  }
  svg:active {
    cursor: grabbing;
  }
  .land {
    stroke: #333;
    stroke-width: 0.3px;
  }
  .graticule {
    fill: none;
    stroke: #666;
    stroke-width: 0.5px;
    stroke-opacity: 0.5;
  }
  .simple-tooltip {
    position: fixed;
    background-color: #1a1a1a;
    color: #fff;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 11px;
    pointer-events: none;
    opacity: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.6);
    border-left: 3px solid #FFD700;
  }
</style>
</head>
<body>
<div class="header">Global Financial Centers Dashboard</div>

<div class="dashboard">
  <div class="left-section">
    <div class="globe-container">
      <svg id="globe-svg" width="500" height="500"></svg>
      <div class="simple-tooltip" id="simple-tooltip"></div>
    </div>
    
    <div style="display: flex; gap: 15px; flex: 1;">
      <div class="chart-container">
        <div class="chart-title">Market Cap (USD Trillion)</div>
        <div id="market-cap-chart"></div>
      </div>
      
      <div class="chart-container">
        <div class="chart-title">Monthly Trade Volume (USD Billion)</div>
        <div id="volume-chart"></div>
      </div>
    </div>
  </div>

  <div class="right-section">
    <div class="info-container">
      <div class="time-box">
        <div class="time-label">Current Time</div>
        <div class="time-display" id="current-time">00:00:00</div>
      </div>
      
      <div class="info-title">Selected City</div>
      <div id="detail-info" style="color: #999; font-size: 11px;">Click on a city to view details</div>
    </div>

    <div class="fever-container">
      <div class="fever-title">Price Movement (USD)</div>
      <svg id="fever-chart" class="fever-chart"></svg>
    </div>
  </div>
</div>

  function selectCity(city) {
    selectedCity = city;
    
    const centerData = financialCenters.find(c => c.city === city);
    if (centerData) {
      const targetRotation = [-centerData.longitude, -centerData.latitude, 0];
      const currentRotation = projection.rotate();
      let t = 0;
      const animationDuration = 1000;
      
      const animateRotation = () => {
        t += 16;
        const progress = Math.min(t / animationDuration, 1);
        
        const interpolatedRotation = [
          currentRotation[0] + (targetRotation[0] - currentRotation[0]) * progress,
          currentRotation[1] + (targetRotation[1] - currentRotation[1]) * progress,
          0
        ];
        
        rotation = interpolatedRotation;
        projection.rotate(interpolatedRotation);
        updateGlobeRender();
        
        if (progress < 1) {
          requestAnimationFrame(animateRotation);
        } else {
          setTimeout(() => {
            const coords = projection([centerData.longitude, centerData.latitude]);
            const mics = centerData.exchanges.map(e => e.mic).join(" / ");
            simpleTooltip
              .style("opacity", 1)
              .style("left", (coords[0] + 250) + "px")
              .style("top", (coords[1] + 50) + "px")
              .html(`${centerData.city} • ${mics}`);
            
            setTimeout(() => {
              simpleTooltip.style("opacity", 0);
            }, 3000);
          }, 50);
        }
      };
      
      requestAnimationFrame(animateRotation);
    }
    
    updateAllGraphics();
  }

  function updateAllGraphics() {
    updateDetailPanel();
    updateFeverChart();
    updateChartHighlights();
    updateGlobeHighlight();
  }

  function getLocalTime(offsetHours) {
    const now = new Date();
    const utcTime = now.getTime() + (now.getTimezoneOffset() * 60000);
    const localTime = new Date(utcTime + (3600000 * offsetHours));
    return localTime;
  }

  function formatTime(date) {
    const h = String(date.getHours()).padStart(2, '0');
    const m = String(date.getMinutes()).padStart(2, '0');
    const s = String(date.getSeconds()).padStart(2, '0');
    return `${h}:${m}:${s}`;
  }

  setInterval(() => {
    const now = new Date();
    document.getElementById("current-time").textContent = formatTime(now);
  }, 1000);

  function updateDetailPanel() {
    const center = financialCenters.find(c => c.city === selectedCity);
    if (!center) return;
    
    const ex = center.exchanges[0];
    const localTime = getLocalTime(center.timeZoneOffset);
    const timeStr = formatTime(localTime);
    
    let html = `<div class="detail-row"><span class="detail-label">City:</span> ${center.city}</div>`;
    html += `<div class="detail-row"><span class="detail-label">Exchange:</span> ${ex.name}</div>`;
    html += `<div class="detail-row"><span class="detail-label">MIC:</span> ${ex.mic}</div>`;
    html += `<div class="detail-row"><span class="detail-label">Region:</span> ${ex.region}</div>`;
    html += `<div class="detail-row"><span class="detail-label">Market Cap:</span> $${ex.marketCap} tn</div>`;
    html += `<div class="detail-row"><span class="detail-label">Monthly Vol:</span> $${ex.monthlyTradeVolume} bn</div>`;
    html += `<div class="detail-row"><span class="detail-label">Time Zone:</span> ${ex.timeZone}</div>`;
    html += `<div class="detail-row"><span class="detail-label">UTC Offset:</span> ${center.timeZoneOffset}:00</div>`;
    html += `<div class="detail-row"><span class="detail-label">Local Time:</span> ${timeStr}</div>`;
    
    document.getElementById("detail-info").innerHTML = html;
  }

  function updateFeverChart() {
    const data = priceData[selectedCity] || [];
    const chartWidth = document.getElementById("fever-chart").clientWidth || 320;
    const chartHeight = 200;
    const margin = { top: 10, right: 15, bottom: 15, left: 35 };
    
    const svg = d3.select("#fever-chart");
    svg.selectAll("*").remove();

    const xScale = d3.scaleLinear()
      .domain([0, data.length - 1])
      .range([margin.left, chartWidth - margin.right]);

    const yScale = d3.scaleLinear()
      .domain([d3.min(data, d => d.close) - 0.1, d3.max(data, d => d.close) + 0.1])
      .range([chartHeight - margin.bottom, margin.top]);

    const area = d3.area()
      .x((d, i) => xScale(i))
      .y0(chartHeight - margin.bottom)
      .y1(d => yScale(d.close));

    const line = d3.line()
      .x((d, i) => xScale(i))
      .y(d => yScale(d.close));

    svg.attr("viewBox", `0 0 ${chartWidth} ${chartHeight}`).attr("preserveAspectRatio", "none").attr("width", "100%").attr("height", "100%");

    const defs = svg.append("defs");
    const gradient = defs.append("linearGradient")
      .attr("id", "fever-gradient")
      .attr("x1", "0%").attr("y1", "0%").attr("x2", "0%").attr("y2", "100%");
    gradient.append("stop").attr("offset", "0%").attr("stop-color", "#FFD700").attr("stop-opacity", 0.6);
    gradient.append("stop").attr("offset", "100%").attr("stop-color", "#FFD700").attr("stop-opacity", 0.1);

    svg.append("path").datum(data).attr("fill", "url(#fever-gradient)").attr("d", area);
    svg.append("path").datum(data).attr("fill", "none").attr("stroke", "#FFD700").attr("stroke-width", 2).attr("d", line);

    svg.append("g").attr("transform", `translate(0, ${chartHeight - margin.bottom})`).call(d3.axisBottom(xScale).tickFormat(d => "")).style("color", "#999").style("font-size", "10px");
    svg.append("g").attr("transform", `translate(${margin.left}, 0)`).call(d3.axisLeft(yScale).ticks(3)).style("color", "#999").style("font-size", "10px");
  }

  function updateChartHighlights() {
    d3.selectAll(".chart-item").classed("active", false);
    d3.selectAll(".chart-item").filter(d => d.city === selectedCity).classed("active", true);
  }

  function updateGlobeHighlight() {
    d3.selectAll(".city-dot").attr("r", d => d.city === selectedCity ? 6 : 4);
    d3.selectAll(".city-circle").attr("stroke-width", d => d.city === selectedCity ? 2 : 1);
  }

  const width = 500, height = 500;
  const data = { "India": 78, "France": 67, "China": 98 };
  const countriesToColor = ["India", "France", "China"];
  const colorScale = d3.scaleLinear().domain([60, 100]).range(["#a6cee3", "#08306b"]);

  const projection = d3.geoOrthographic().scale(220).translate([width / 2, height / 2]).clipAngle(90);
  const path = d3.geoPath(projection);
  const graticule = d3.geoGraticule10();
  const svg = d3.select("#globe-svg");
  const simpleTooltip = d3.select("#simple-tooltip");

  svg.append("path").datum(graticule).attr("class", "graticule").attr("d", path);

  let rotation = [0, -20, 0];
  let isDragging = false;
  let dragStartX = 0;
  let autoRotate = true;

  svg.on("mousedown", function(event) {
    isDragging = true;
    dragStartX = event.clientX;
    autoRotate = false;
  });

  document.addEventListener("mousemove", function(event) {
    if (isDragging) {
      const dragDelta = event.clientX - dragStartX;
      rotation[0] += dragDelta * 0.5;
      dragStartX = event.clientX;
      projection.rotate(rotation);
      updateGlobeRender();
    }
  });

  document.addEventListener("mouseup", function() {
    isDragging = false;
    autoRotate = true;
  });

  function updateGlobeRender() {
    svg.selectAll("path.land").attr("d", path);
    svg.select(".graticule").attr("d", path(graticule));
    
    svg.selectAll(".volume-circle")
      .attr("cx", d => { const coords = projection([d.longitude, d.latitude]); return coords ? coords[0] : 0; })
      .attr("cy", d => { const coords = projection([d.longitude, d.latitude]); return coords ? coords[1] : 0; })
      .attr("opacity", d => {
        const currentRotation = projection.rotate();
        const rotated = d3.geoRotation(currentRotation);
        const point = rotated([d.longitude, d.latitude]);
        const depth = Math.cos(point[1] * Math.PI / 180) * Math.cos(point[0] * Math.PI / 180);
        return Math.max(0, depth * 0.25);
      });

    svg.selectAll(".city-circle")
      .attr("cx", d => { const coords = projection([d.longitude, d.latitude]); return coords ? coords[0] : 0; })
      .attr("cy", d => { const coords = projection([d.longitude, d.latitude]); return coords ? coords[1] : 0; })
      .attr("opacity", d => {
        const currentRotation = projection.rotate();
        const rotated = d3.geoRotation(currentRotation);
        const point = rotated([d.longitude, d.latitude]);
        const depth = Math.cos(point[1] * Math.PI / 180) * Math.cos(point[0] * Math.PI / 180);
        return Math.max(0, depth);
      });

    svg.selectAll(".city-dot")
      .attr("cx", d => { const coords = projection([d.longitude, d.latitude]); return coords ? coords[0] : 0; })
      .attr("cy", d => { const coords = projection([d.longitude, d.latitude]); return coords ? coords[1] : 0; })
      .attr("opacity", d => {
        const currentRotation = projection.rotate();
        const rotated = d3.geoRotation(currentRotation);
        const point = rotated([d.longitude, d.latitude]);
        const depth = Math.cos(point[1] * Math.PI / 180) * Math.cos(point[0] * Math.PI / 180);
        return Math.max(0, depth);
      })
      .style("pointer-events", d => {
        const currentRotation = projection.rotate();
        const rotated = d3.geoRotation(currentRotation);
        const point = rotated([d.longitude, d.latitude]);
        const depth = Math.cos(point[1] * Math.PI / 180) * Math.cos(point[0] * Math.PI / 180);
        return depth < 0.05 ? "none" : "auto";
      });
  }

  const chartData = [];
  financialCenters.forEach(center => {
    center.exchanges.forEach(ex => {
      chartData.push({
        city: center.city,
        exchange: ex.name,
        mic: ex.mic,
        region: ex.region,
        marketCap: ex.marketCap,
        monthlyVolume: ex.monthlyTradeVolume,
        timeZone: ex.timeZone,
        name: ex.name,
        timeZoneOffset: center.timeZoneOffset
      });
    });
  });

  const maxMarketCap = d3.max(chartData, d => d.marketCap);
  const maxVolume = d3.max(chartData, d => d.monthlyVolume);
  
  d3.select("#market-cap-chart").selectAll(".chart-item")
    .data(chartData.sort((a, b) => b.marketCap - a.marketCap))
    .enter()
    .append("div")
    .attr("class", "chart-item")
    .on("click", function(event, d) {
      selectCity(d.city);
    })
    .html(d => `
      <div class="chart-label">${d.city}</div>
      <div style="position: relative; padding-right: 50px;">
        <div class="chart-bar" style="width: ${(d.marketCap / maxMarketCap) * 300}px;"></div>
        <div class="chart-value">${d.marketCap.toFixed(2)}</div>
      </div>
    `);

  d3.select("#volume-chart").selectAll(".chart-item")
    .data(chartData.sort((a, b) => b.monthlyVolume - a.monthlyVolume))
    .enter()
    .append("div")
    .attr("class", "chart-item")
    .on("click", function(event, d) {
      selectCity(d.city);
    })
    .html(d => `
      <div class="chart-label">${d.city}</div>
      <div style="position: relative; padding-right: 50px;">
        <div class="chart-bar" style="width: ${(d.monthlyVolume / maxVolume) * 300}px;"></div>
        <div class="chart-value">${d.monthlyVolume.toFixed(1)}</div>
      </div>
    `);

  d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json").then(countriesTopo => {
    const countries = topojson.feature(countriesTopo, countriesTopo.objects.countries).features;
    
    svg.selectAll("path.land")
      .data(countries)
      .join("path")
      .attr("class", "land")
      .attr("d", path)
      .attr("fill", d => countriesToColor.includes(d.properties.name) ? colorScale(data[d.properties.name]) : "#999");

    svg.selectAll(".volume-circle")
      .data(financialCenters)
      .enter()
      .append("circle")
      .attr("class", "volume-circle")
      .attr("cx", d => { const coords = projection([d.longitude, d.latitude]); return coords ? coords[0] : 0; })
      .attr("cy", d => { const coords = projection([d.longitude, d.latitude]); return coords ? coords[1] : 0; })
      .attr("r", d => { const maxVol = d3.max(financialCenters, c => d3.max(c.exchanges, e => e.monthlyTradeVolume)); const avgVol = d3.mean(d.exchanges, e => e.monthlyTradeVolume); return (avgVol / maxVol) * 25 + 4; })
      .attr("fill", "#FF6B6B")
      .attr("opacity", 0.25)
      .attr("stroke", "none");

    svg.selectAll(".city-circle")
      .data(financialCenters)
      .enter()
      .append("circle")
      .attr("class", "city-circle")
      .attr("cx", d => { const coords = projection([d.longitude, d.latitude]); return coords ? coords[0] : 0; })
      .attr("cy", d => { const coords = projection([d.longitude, d.latitude]); return coords ? coords[1] : 0; })
      .attr("r", 8)
      .attr("fill", "none")
      .attr("stroke", "#FFD700")
      .attr("stroke-width", 1)
      .attr("opacity", 0.9);

    svg.selectAll(".city-dot")
      .data(financialCenters)
      .enter()
      .append("circle")
      .attr("class", "city-dot")
      .attr("cx", d => { const coords = projection([d.longitude, d.latitude]); return coords ? coords[0] : 0; })
      .attr("cy", d => { const coords = projection([d.longitude, d.latitude]); return coords ? coords[1] : 0; })
      .attr("r", 4)
      .attr("fill", "#FFD700")
      .attr("opacity", 0.9)
      .attr("stroke", "white")
      .attr("stroke-width", 1)
      .on("mousemove", (event, d) => {
        const mics = d.exchanges.map(e => e.mic).join(" / ");
        simpleTooltip
          .style("opacity", 1)
          .style("left", (event.pageX + 10) + "px")
          .style("top", (event.pageY - 25) + "px")
          .html(`${d.city} • ${mics}`);
      })
      .on("mouseout", () => simpleTooltip.style("opacity", 0))
      .on("click", function(event, d) {
        selectCity(d.city);
      });

    updateFeverChart();
    updateDetailPanel();

    d3.timer(() => {
      if (autoRotate) {
        rotation[0] += 0.3;
      }
      projection.rotate(rotation);
      updateGlobeRender();
    });
  });
</script>
</body>
</html>
