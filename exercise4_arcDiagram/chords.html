<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2022 Quarter-Finals Chord Diagram</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 1000px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        #chart {
            display: flex;
            justify-content: center;
            width: 100%;
        }
        
        .chord {
            fill-opacity: 0.67;
            stroke: none;
            transition: fill-opacity 0.2s;
        }
        
        .chord:hover {
            fill-opacity: 0.8;
        }
        
        .chord.fade {
            fill-opacity: 0.1;
        }
        
        .group-arc {
            cursor: pointer;
        }
        
        .group-arc.active {
            stroke-width: 3px;
        }
        
        .group-label {
            font-size: 12px;
            font-weight: 500;
            pointer-events: none;
        }
        
        .legend {
            margin-top: 30px;
            font-size: 13px;
            color: #666;
            text-align: center;
        }
        
        .legend-item {
            display: inline-block;
            margin-right: 30px;
        }
        
        .legend-color {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 2px;
            margin-right: 6px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ FIFA World Cup 2022 Quarter-Finals</h1>
        <p class="subtitle">Chord width represents total goals in each match</p>
        <div id="chart"></div>
        <div class="legend">
            <div class="legend-item">
                <span class="legend-color" style="background-color: #FF6B6B;"></span>
                <span>Match Goals</span>
            </div>
        </div>
    </div>

    <script>
        // Data: teams and their matches
        const teams = [
            'Croatia', 'Brazil',
            'Netherlands', 'Argentina',
            'Morocco', 'Portugal',
            'England', 'France'
        ];

        // Create a matrix where entry [i][j] represents goals in match between team i and j
        const matrix = Array(teams.length).fill(null).map(() => Array(teams.length).fill(0));

        // Quarter-finals matches (indices in teams array)
        // Croatia (0) vs Brazil (1): 1-1, Croatia won 4-2 on penalties → total 2 goals
        matrix[0][1] = 2;
        matrix[1][0] = 2;

        // Netherlands (2) vs Argentina (3): 2-2, Argentina won 4-3 on penalties → total 4 goals
        matrix[2][3] = 4;
        matrix[3][2] = 4;

        // Morocco (4) vs Portugal (5): 1-0 → total 1 goal
        matrix[4][5] = 1;
        matrix[5][4] = 1;

        // England (6) vs France (7): 1-2 → total 3 goals
        matrix[6][7] = 3;
        matrix[7][6] = 3;

        // Colors for teams
        const colors = d3.scaleOrdinal()
            .domain(teams)
            .range([
                '#FF6B6B', '#FFA500',  // Croatia, Brazil
                '#4ECDC4', '#87CEEB',  // Netherlands, Argentina
                '#F7DC6F', '#E74C3C',  // Morocco, Portugal
                '#3498DB', '#9B59B6'   // England, France
            ]);

        // Chord diagram setup
        const width = 700;
        const height = 700;
        const innerRadius = Math.min(width, height) * 0.3;
        const outerRadius = innerRadius + 30;

        const svg = d3.select('#chart')
            .append('svg')
            .attr('width', width)
            .attr('height', height)
            .attr('viewBox', [-width / 2, -height / 2, width, height])
            .attr('style', 'max-width: 100%; height: auto;');

        const g = svg.append('g');

        // Generate chord diagram
        const chord = d3.chord()
            .padAngle(0.05)
            .sortSubgroups(d3.descending);

        const arc = d3.arc()
            .innerRadius(innerRadius)
            .outerRadius(outerRadius);

        const ribbon = d3.ribbon()
            .source(d => d.source)
            .target(d => d.target);

        const chords = chord(matrix);

        // Draw ribbons (connections between teams)
        const ribbonsGroup = g.append('g')
            .attr('fill-opacity', 0.67);
            
        const ribbons = ribbonsGroup.selectAll('path')
            .data(chords)
            .join('path')
            .attr('d', ribbon)
            .attr('fill', d => colors(teams[d.source.index]))
            .attr('stroke', d => d3.rgb(colors(teams[d.source.index])).darker())
            .attr('class', 'chord')
            .append('title')
            .text(d => {
                const sourceTeam = teams[d.source.index];
                const targetTeam = teams[d.target.index];
                const goals = matrix[d.source.index][d.target.index];
                return `${sourceTeam} vs ${targetTeam}: ${goals} goals total`;
            });

        // Draw group arcs (teams)
        const group = g.append('g')
            .selectAll('g')
            .data(chords.groups)
            .join('g');

        group.append('path')
            .attr('d', arc)
            .attr('fill', d => colors(teams[d.index]))
            .attr('stroke', d => d3.rgb(colors(teams[d.index])).darker())
            .attr('class', 'group-arc')
            .on('click', function(event, d) {
                event.stopPropagation();
                const index = d.index;
                
                // Toggle active state
                const isActive = d3.select(this).classed('active');
                
                // Remove all active states
                d3.selectAll('.group-arc').classed('active', false);
                d3.selectAll('.chord').classed('fade', false);
                
                if (!isActive) {
                    // Add active state to clicked arc
                    d3.select(this).classed('active', true);
                    
                    // Fade out chords that don't connect to this team
                    ribbonsGroup.selectAll('path').classed('fade', d => {
                        return d.source.index !== index && d.target.index !== index;
                    });
                }
            })
            .append('title')
            .text(d => `${teams[d.index]}`);
        
        // Click elsewhere to deselect
        svg.on('click', function() {
            d3.selectAll('.group-arc').classed('active', false);
            d3.selectAll('.chord').classed('fade', false);
        });

        // Add labels
        group.append('text')
            .attr('dy', 6)
            .attr('class', 'group-label')
            .append('textPath')
            .attr('xlink:href', (d, i) => `#group-${i}`)
            .attr('startOffset', '50%')
            .attr('text-anchor', 'middle')
            .text(d => teams[d.index]);

        // Add paths for labels
        g.append('g').selectAll('path')
            .data(chords.groups)
            .join('path')
            .attr('id', (d, i) => `group-${i}`)
            .attr('d', d => {
                const start = arc.startAngle(d.startAngle).endAngle(d.endAngle)();
                return d3.path();
            })
            .attr('d', d => {
                const radius = outerRadius + 40;
                const startAngle = d.startAngle;
                const endAngle = d.endAngle;
                const midAngle = (startAngle + endAngle) / 2;

                // Create a circular arc path for the label
                return `
                    M ${radius * Math.cos(startAngle - Math.PI / 2)} ${radius * Math.sin(startAngle - Math.PI / 2)}
                    A ${radius} ${radius} 0 0 1 ${radius * Math.cos(endAngle - Math.PI / 2)} ${radius * Math.sin(endAngle - Math.PI / 2)}
                `;
            })
            .style('fill', 'none')
            .style('stroke', 'none');

        // Alternative label positioning
        group.append('text')
            .attr('transform', d => {
                const angle = (d.startAngle + d.endAngle) / 2;
                const radius = outerRadius + 50;
                return `translate(${radius * Math.cos(angle - Math.PI / 2)}, ${radius * Math.sin(angle - Math.PI / 2)})
                        rotate(${(angle * 180 / Math.PI - 90)})`;
            })
            .attr('x', 0)
            .attr('y', 0)
            .attr('dy', '0.35em')
            .attr('text-anchor', 'middle')
            .attr('font-size', '12px')
            .attr('font-weight', 'bold')
            .attr('fill', '#333')
            .text(d => teams[d.index]);
    </script>
</body>
</html>
