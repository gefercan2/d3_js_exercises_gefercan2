<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Rotating Globe with Financial Centers</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson@3"></script>
<style>
  body {
    margin: 0;
    background: #222;
    font-family: sans-serif;
    display: flex;
    height: 100vh;
    flex-direction: column;
  }
  .main-content {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  .globe-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  svg {
    display: block;
    background: #0b3d91;
    cursor: grab;
  }
  svg:active {
    cursor: grabbing;
  }
  .land {
    stroke: #333;
    stroke-width: 0.3px;
  }
  .graticule {
    fill: none;
    stroke: #666;
    stroke-width: 0.5px;
    stroke-opacity: 0.5;
  }
  .simple-tooltip {
    position: absolute;
    background-color: #1a1a1a;
    color: #fff;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.6);
    border-left: 3px solid #FFD700;
    white-space: nowrap;
  }
  .charts-container {
    width: 380px;
    background: #1a1a1a;
    padding: 20px;
    overflow-y: auto;
    border-left: 1px solid #444;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .chart-section {
    flex: 1;
  }
  .chart-title {
    color: #FFD700;
    font-weight: bold;
    margin-bottom: 15px;
    font-size: 14px;
  }
  .chart-item {
    margin-bottom: 12px;
  }
  .chart-label {
    color: #ccc;
    font-size: 11px;
    margin-bottom: 4px;
    cursor: pointer;
  }
  .chart-label:hover {
    color: #FFD700;
  }
  .chart-bar {
    height: 16px;
    background: linear-gradient(90deg, #FFD700, #FFA500);
    border-radius: 2px;
    position: relative;
  }
  .chart-value {
    color: #ccc;
    font-size: 10px;
    margin-left: 4px;
    position: absolute;
    top: 0;
    right: -50px;
    width: 45px;
    text-align: right;
  }
  .divider {
    border-top: 1px solid #444;
    margin: 0;
  }
  .time-box {
    background: #0b3d91;
    border: 1px solid #FFD700;
    padding: 15px;
    border-radius: 4px;
    text-align: center;
    margin-bottom: 15px;
  }
  .time-label {
    color: #ccc;
    font-size: 11px;
    margin-bottom: 8px;
  }
  .time-display {
    color: #FFD700;
    font-weight: bold;
    font-size: 24px;
    font-family: monospace;
  }
  .detail-panel {
    background: #0b3d91;
    border: 1px solid #FFD700;
    padding: 15px;
    border-radius: 4px;
    margin-top: auto;
  }
  .detail-title {
    color: #FFD700;
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 10px;
  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    color: #ccc;
    font-size: 12px;
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .detail-label {
    font-weight: bold;
    margin-right: 10px;
    color: #FFD700;
    min-width: 80px;
  }
  .bar-tooltip {
    position: absolute;
    background-color: #1a1a1a;
    color: #fff;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 11px;
    pointer-events: none;
    opacity: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.6);
    border-left: 3px solid #FFD700;
    white-space: nowrap;
  }
  .fever-chart-container {
    width: 100%;
    height: 250px;
    background: #1a1a1a;
    border-top: 1px solid #444;
    padding: 15px;
    overflow: hidden;
  }
  .fever-chart-title {
    color: #FFD700;
    font-weight: bold;
    font-size: 12px;
    margin-bottom: 10px;
  }
  #fever-chart {
    width: 100%;
    height: 200px;
  }
</style>
</head>

<div class="main-content">
  <div class="globe-container">
    <svg width="600" height="600"></svg>
    <div class="simple-tooltip" id="simple-tooltip"></div>
  </div>
  <div class="charts-container">
    <div class="time-box">
      <div class="time-label">Current Time</div>
      <div class="time-display" id="current-time">00:00:00</div>
    </div>
    
    <div class="chart-section">
      <div class="chart-title">Market Cap (USD Trillion)</div>
      <div id="market-cap-chart"></div>
    </div>
    
    <div class="divider"></div>
    
    <div class="chart-section">
      <div class="chart-title">Monthly Trade Volume (USD Billion)</div>
      <div id="volume-chart"></div>
    </div>

    <div class="detail-panel">
      <div class="detail-title">Selected City</div>
      <div id="detail-info" style="color: #999; font-size: 12px;">Click on a city to view details</div>
    </div>
  </div>
</div>

<div class="fever-chart-container">
  <div class="fever-chart-title">Price Movement (Closing Price)</div>
  <svg id="fever-chart"></svg>
</div>

<div class="bar-tooltip" id="bar-tooltip"></div>

    { "city": "Mumbai", "exchange": "BSE", "latitude": 18.9300, "longitude": 72.8335, "timeZoneOffset": 5.5, "exchanges": [{ "name": "Bombay Stock Exchange", "mic": "XBOM", "region": "India", "marketCap": 5.25, "monthlyTradeVolume": 501, "timeZone": "IST" }, { "name": "National Stock Exchange", "mic": "XNSE", "region": "India", "marketCap": 5.32, "monthlyTradeVolume": 294, "timeZone": "IST" }] },
    { "city": "Hong Kong", "exchange": "HKEX", "latitude": 22.2844, "longitude": 114.1595, "timeZoneOffset": 8, "exchanges": [{ "name": "Hong Kong Exchanges and Clearing", "mic": "XHKG", "region": "Hong Kong", "marketCap": 6.3, "monthlyTradeVolume": 380, "timeZone": "HKT" }] }
  ];

  let selectedCity = null;
  let selectedCityForChart = "New York";

  function getLocalTime(offsetHours) {
    const now = new Date();
    const utcTime = now.getTime() + (now.getTimezoneOffset() * 60000);
    const localTime = new Date(utcTime + (3600000 * offsetHours));
    return localTime;
  }

  function formatTime(date) {
    const h = String(date.getHours()).padStart(2, '0');
    const m = String(date.getMinutes()).padStart(2, '0');
    const s = String(date.getSeconds()).padStart(2, '0');
    return `${h}:${m}:${s}`;
  }

  // Update current time
  setInterval(() => {
    const now = new Date();
    document.getElementById("current-time").textContent = formatTime(now);
  }, 1000);

  // Fever Chart
  function updateFeverChart(city) {
    const data = priceData[city] || [];
    const chartWidth = document.getElementById("fever-chart").clientWidth;
    const chartHeight = 200;
    const margin = { top: 10, right: 20, bottom: 20, left: 40 };
    
    const svg = d3.select("#fever-chart");
    svg.selectAll("*").remove();

    const xScale = d3.scaleLinear()
      .domain([0, data.length - 1])
      .range([margin.left, chartWidth - margin.right]);

    const yScale = d3.scaleLinear()
      .domain([d3.min(data, d => d.close) - 0.1, d3.max(data, d => d.close) + 0.1])
      .range([chartHeight - margin.bottom, margin.top]);

    const area = d3.area()
      .x((d, i) => xScale(i))
      .y0(chartHeight - margin.bottom)
      .y1(d => yScale(d.close));

    const line = d3.line()
      .x((d, i) => xScale(i))
      .y(d => yScale(d.close));

    // Add area
    svg.append("path")
      .datum(data)
      .attr("fill", "url(#fever-gradient)")
      .attr("d", area);

    // Add line
    svg.append("path")
      .datum(data)
      .attr("fill", "none")
      .attr("stroke", "#FFD700")
      .attr("stroke-width", 2)
      .attr("d", line);

    // Add gradient
    const defs = svg.append("defs");
    const gradient = defs.append("linearGradient")
      .attr("id", "fever-gradient")
      .attr("x1", "0%")
      .attr("y1", "0%")
      .attr("x2", "0%")
      .attr("y2", "100%");

    gradient.append("stop")
      .attr("offset", "0%")
      .attr("stop-color", "#FFD700")
      .attr("stop-opacity", 0.6);

    gradient.append("stop")
      .attr("offset", "100%")
      .attr("stop-color", "#FFD700")
      .attr("stop-opacity", 0.1);

    // Add axes
    svg.append("g")
      .attr("transform", `translate(0, ${chartHeight - margin.bottom})`)
      .call(d3.axisBottom(xScale).tickFormat(d => ""))
      .style("color", "#999")
      .style("font-size", "10px");

    svg.append("g")
      .attr("transform", `translate(${margin.left}, 0)`)
      .call(d3.axisLeft(yScale).ticks(4))
      .style("color", "#999")
      .style("font-size", "10px");
  }

  // Flatten data for charts
  const chartData = [];
  financialCenters.forEach(center => {
    center.exchanges.forEach(ex => {
      chartData.push({
        city: center.city,
        exchange: ex.name,
        mic: ex.mic,
        marketCap: ex.marketCap,
        monthlyVolume: ex.monthlyTradeVolume,
        timeZoneOffset: center.timeZoneOffset
      });
    });
  });

  const projection = d3.geoOrthographic()
    .scale(280)
    .translate([width / 2, height / 2])
    .clipAngle(90);

  const path = d3.geoPath(projection);
  const graticule = d3.geoGraticule10();
  const svg = d3.select("svg");
  const simpleTooltip = d3.select("#simple-tooltip");
  const barTooltip = d3.select("#bar-tooltip");

  svg.append("path")
    .datum(graticule)
    .attr("class", "graticule")
    .attr("d", path);

  // Create bar charts with tooltips
  const maxMarketCap = d3.max(chartData, d => d.marketCap);
  const maxVolume = d3.max(chartData, d => d.monthlyVolume);
  
  const marketCapChart = d3.select("#market-cap-chart");
  marketCapChart.selectAll(".chart-item")
    .data(chartData.sort((a, b) => b.marketCap - a.marketCap))
    .enter()
    .append("div")
    .attr("class", "chart-item")
    .on("mousemove", function(event, d) {
      barTooltip
        .style("opacity", 1)
        .style("left", (event.pageX + 10) + "px")
        .style("top", (event.pageY - 25) + "px")
        .text(`${d.city} - ${d.mic}: $${d.marketCap.toFixed(2)}tn`);
    })
    .on("mouseout", function() {
      barTooltip.style("opacity", 0);
    })
    .on("click", function(event, d) {
      selectedCity = d;
      selectedCityForChart = d.city;
      updateDetailPanel(d);
      updateFeverChart(d.city);
    })
    .html(d => `
      <div class="chart-label">${d.city}</div>
      <div style="position: relative; padding-right: 50px;">
        <div class="chart-bar" style="width: ${(d.marketCap / maxMarketCap) * 250}px;"></div>
        <div class="chart-value">${d.marketCap.toFixed(2)}</div>
      </div>
    `);

  const volumeChart = d3.select("#volume-chart");
  volumeChart.selectAll(".chart-item")
    .data(chartData.sort((a, b) => b.monthlyVolume - a.monthlyVolume))
    .enter()
    .append("div")
    .attr("class", "chart-item")
    .on("mousemove", function(event, d) {
      barTooltip
        .style("opacity", 1)
        .style("left", (event.pageX + 10) + "px")
        .style("top", (event.pageY - 25) + "px")
        .text(`${d.city} - ${d.mic}: $${d.monthlyVolume.toFixed(1)}bn`);
    })
    .on("mouseout", function() {
      barTooltip.style("opacity", 0);
    })
    .on("click", function(event, d) {
      selectedCity = d;
      selectedCityForChart = d.city;
      updateDetailPanel(d);
      updateFeverChart(d.city);
    })
    .html(d => `
      <div class="chart-label">${d.city}</div>
      <div style="position: relative; padding-right: 60px;">
        <div class="chart-bar" style="width: ${(d.monthlyVolume / maxVolume) * 250}px;"></div>
        <div class="chart-value">${d.monthlyVolume.toFixed(1)}</div>
      </div>
    `);

  function updateDetailPanel(center) {
    const localTime = getLocalTime(center.timeZoneOffset);
    const timeStr = formatTime(localTime);
    
    let html = `<div class="detail-row"><span class="detail-label">City:</span> ${center.city}</div>`;
    html += `<div class="detail-row"><span class="detail-label">Exchange:</span> ${center.name || 'N/A'}</div>`;
    html += `<div class="detail-row"><span class="detail-label">MIC:</span> ${center.mic}</div>`;
    html += `<div class="detail-row"><span class="detail-label">Region:</span> ${center.region || 'N/A'}</div>`;
    html += `<div class="detail-row"><span class="detail-label">Market Cap:</span> $${center.marketCap} tn</div>`;
    html += `<div class="detail-row"><span class="detail-label">Monthly Vol:</span> $${center.monthlyTradeVolume} bn</div>`;
    html += `<div class="detail-row"><span class="detail-label">Time Zone:</span> ${center.timeZone || 'N/A'}</div>`;
    html += `<div class="detail-row"><span class="detail-label">UTC Offset:</span> ${center.timeZoneOffset}:00</div>`;
    html += `<div class="detail-row"><span class="detail-label">Local Time:</span> ${timeStr}</div>`;
    
    document.getElementById("detail-info").innerHTML = html;
  }

  let land;
  let rotation = 0;
  let isDragging = false;
  let dragStartX = 0;
  let autoRotate = true;

  svg.on("mousedown", function(event) {
    isDragging = true;
    dragStartX = event.clientX;
    autoRotate = false;
  });

  document.addEventListener("mousemove", function(event) {
    if (isDragging) {
      const dragDelta = event.clientX - dragStartX;
      rotation += dragDelta * 0.5;
      dragStartX = event.clientX;
    }
  });

  document.addEventListener("mouseup", function() {
    isDragging = false;
    autoRotate = true;
  });

  d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json").then(countriesTopo => {
    const countries = topojson.feature(countriesTopo, countriesTopo.objects.countries).features;
    
    svg.selectAll("path.land")
      .data(countries)
      .join("path")
      .attr("class", "land")
      .attr("d", path)
      .attr("fill", d => {
        if (countriesToColor.includes(d.properties.name)) {
          return colorScale(data[d.properties.name]);
        }
        return "#999";
      });

    // Add semi-transparent volume circles
    svg.selectAll(".volume-circle")
      .data(financialCenters)
      .enter()
      .append("circle")
      .attr("class", "volume-circle")
      .attr("cx", d => {
        const coords = projection([d.longitude, d.latitude]);
        return coords ? coords[0] : 0;
      })
      .attr("cy", d => {
        const coords = projection([d.longitude, d.latitude]);
        return coords ? coords[1] : 0;
      })
      .attr("r", d => {
        const maxVol = d3.max(financialCenters, c => d3.max(c.exchanges, e => e.monthlyTradeVolume));
        const avgVol = d3.mean(d.exchanges, e => e.monthlyTradeVolume);
        return (avgVol / maxVol) * 30 + 5;
      })
      .attr("fill", "#FF6B6B")
      .attr("opacity", 0.25)
      .attr("stroke", "none");

    // Add city circles (outline only)
    svg.selectAll(".city-circle")
      .data(financialCenters)
      .enter()
      .append("circle")
      .attr("class", "city-circle")
      .attr("cx", d => {
        const coords = projection([d.longitude, d.latitude]);
        return coords ? coords[0] : 0;
      })
      .attr("cy", d => {
        const coords = projection([d.longitude, d.latitude]);
        return coords ? coords[1] : 0;
      })
      .attr("r", 8)
      .attr("fill", "none")
      .attr("stroke", "#FFD700")
      .attr("stroke-width", 1)
      .attr("opacity", 0.9);

    // Add city dots
    svg.selectAll(".city-dot")
      .data(financialCenters)
      .enter()
      .append("circle")
      .attr("class", "city-dot")
      .attr("cx", d => {
        const coords = projection([d.longitude, d.latitude]);
        return coords ? coords[0] : 0;
      })
      .attr("cy", d => {
        const coords = projection([d.longitude, d.latitude]);
        return coords ? coords[1] : 0;
      })
      .attr("r", 4)
      .attr("fill", "#FFD700")
      .attr("opacity", 0.9)
      .attr("stroke", "white")
      .attr("stroke-width", 1)
      .on("mousemove", (event, d) => {
        const localTime = getLocalTime(d.timeZoneOffset);
        const timeStr = formatTime(localTime);
        const mics = d.exchanges.map(e => e.mic).join(" / ");
        simpleTooltip
          .style("opacity", 1)
          .style("left", (event.pageX + 10) + "px")
          .style("top", (event.pageY - 25) + "px")
          .html(`${d.city} • ${mics}<br/>${timeStr}`);
      })
      .on("mouseout", () => simpleTooltip.style("opacity", 0))
      .on("click", function(event, d) {
        selectedCity = d.exchanges[0];
        selectedCity.city = d.city;
        selectedCityForChart = d.city;
        updateDetailPanel(selectedCity);
        updateFeverChart(d.city);
      });

    // Initialize fever chart with New York
    updateFeverChart("New York");

    // Start rotation animation
    d3.timer(() => {
      if (autoRotate) {
        rotation = (rotation + 0.3) % 360;
      }
      projection.rotate([rotation, -20]);
      
      svg.selectAll("path.land").attr("d", path);
      svg.select(".graticule").attr("d", path(graticule));
      
      // Update volume circles
      svg.selectAll(".volume-circle")
        .attr("cx", d => {
          const coords = projection([d.longitude, d.latitude]);
          return coords ? coords[0] : 0;
        })
        .attr("cy", d => {
          const coords = projection([d.longitude, d.latitude]);
          return coords ? coords[1] : 0;
        })
        .attr("opacity", d => {
          const currentRotation = projection.rotate();
          const rotated = d3.geoRotation(currentRotation);
          const point = rotated([d.longitude, d.latitude]);
          const depth = Math.cos(point[1] * Math.PI / 180) * Math.cos(point[0] * Math.PI / 180);
          return Math.max(0, depth * 0.25);
        });

      // Update circles
      svg.selectAll(".city-circle")
        .attr("cx", d => {
          const coords = projection([d.longitude, d.latitude]);
          return coords ? coords[0] : 0;
        })
        .attr("cy", d => {
          const coords = projection([d.longitude, d.latitude]);
          return coords ? coords[1] : 0;
        })
        .attr("opacity", d => {
          const currentRotation = projection.rotate();
          const rotated = d3.geoRotation(currentRotation);
          const point = rotated([d.longitude, d.latitude]);
          const depth = Math.cos(point[1] * Math.PI / 180) * Math.cos(point[0] * Math.PI / 180);
          return Math.max(0, depth);
        })
        .style("pointer-events", d => {
          const currentRotation = projection.rotate();
          const rotated = d3.geoRotation(currentRotation);
          const point = rotated([d.longitude, d.latitude]);
          const depth = Math.cos(point[1] * Math.PI / 180) * Math.cos(point[0] * Math.PI / 180);
          return depth < 0.05 ? "none" : "auto";
        });

      // Update city dots with 3D depth effect
      svg.selectAll(".city-dot")
        .attr("cx", d => {
          const coords = projection([d.longitude, d.latitude]);
          return coords ? coords[0] : 0;
        })
        .attr("cy", d => {
          const coords = projection([d.longitude, d.latitude]);
          return coords ? coords[1] : 0;
        })
        .attr("opacity", d => {
          const currentRotation = projection.rotate();
          const rotated = d3.geoRotation(currentRotation);
          const point = rotated([d.longitude, d.latitude]);
          const depth = Math.cos(point[1] * Math.PI / 180) * Math.cos(point[0] * Math.PI / 180);
          return Math.max(0, depth);
        })
        .style("pointer-events", d => {
          const currentRotation = projection.rotate();
          const rotated = d3.geoRotation(currentRotation);
          const point = rotated([d.longitude, d.latitude]);
          const depth = Math.cos(point[1] * Math.PI / 180) * Math.cos(point[0] * Math.PI / 180);
          return depth < 0.05 ? "none" : "auto";
        });
    });
  });
</script>
</body>
</html>
