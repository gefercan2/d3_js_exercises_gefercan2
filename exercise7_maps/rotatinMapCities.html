<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Rotating Globe with Financial Centers</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson@3"></script>
<style>
  body {
    margin: 0;
    background: #222;
    font-family: sans-serif;
    overflow: hidden;
  }
  svg {
    display: block;
    margin: auto;
    background: #0b3d91;
  }
  .land {
    stroke: #333;
    stroke-width: 0.3px;
  }
  .graticule {
    fill: none;
    stroke: #666;
    stroke-width: 0.5px;
    stroke-opacity: 0.5;
  }
  .tooltip {
    position: absolute;
    background-color: #1a1a1a;
    color: #fff;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    border-left: 3px solid #FFD700;
  }
</style>
</head>
<body>
<svg width="600" height="600"></svg>
<div class="tooltip"></div>
<script>
  const width = 600, height = 600;
  const data = {
    "India": 78,
    "France": 67,
    "China": 98
  };
  const countriesToColor = ["India", "France", "China"];
  const colorScale = d3.scaleLinear()
    .domain([60, 100])
    .range(["#a6cee3", "#08306b"]);
  
  const financialCenters = [
    { "city": "New York", "exchange": "NYSE", "latitude": 40.7069, "longitude": -74.0113 },
    { "city": "Tokyo", "exchange": "TSE", "latitude": 35.6812, "longitude": 139.7775 },
    { "city": "Shanghai", "exchange": "SSE", "latitude": 31.2304, "longitude": 121.4737 },
    { "city": "London", "exchange": "LSE", "latitude": 51.5151, "longitude": -0.0998 },
    { "city": "Frankfurt", "exchange": "Xetra", "latitude": 50.1153, "longitude": 8.6779 },
    { "city": "Zurich", "exchange": "SIX", "latitude": 47.3769, "longitude": 8.5417 },
    { "city": "Paris", "exchange": "Euronext", "latitude": 48.8694, "longitude": 2.3417 },
    { "city": "Mumbai", "exchange": "BSE", "latitude": 18.9300, "longitude": 72.8335 },
    { "city": "Hong Kong", "exchange": "HKEX", "latitude": 22.2844, "longitude": 114.1595 }
  ];

  const projection = d3.geoOrthographic()
    .scale(280)
    .translate([width / 2, height / 2])
    .clipAngle(90);

  const path = d3.geoPath(projection);
  const graticule = d3.geoGraticule10();
  const svg = d3.select("svg");
  const tooltip = d3.select(".tooltip");

  svg.append("path")
    .datum(graticule)
    .attr("class", "graticule")
    .attr("d", path);

  let land;
  let rotation = 0;

  d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json").then(countriesTopo => {
    const countries = topojson.feature(countriesTopo, countriesTopo.objects.countries).features;
    
    svg.selectAll("path.land")
      .data(countries)
      .join("path")
      .attr("class", "land")
      .attr("d", path)
      .attr("fill", d => {
        if (countriesToColor.includes(d.properties.name)) {
          return colorScale(data[d.properties.name]);
        }
        return "#999";
      })
      .on("mousemove", (event, d) => {
        if (countriesToColor.includes(d.properties.name)) {
          tooltip
            .style("opacity", 1)
            .style("left", (event.pageX + 10) + "px")
            .style("top", (event.pageY - 25) + "px")
            .html(`${d.properties.name}: ${data[d.properties.name]}`);
        } else {
          tooltip.style("opacity", 0);
        }
      })
      .on("mouseout", () => tooltip.style("opacity", 0));

    // Add city dots
    svg.selectAll(".city-dot")
      .data(financialCenters)
      .enter()
      .append("circle")
      .attr("class", "city-dot")
      .attr("cx", d => {
        const coords = projection([d.longitude, d.latitude]);
        return coords ? coords[0] : 0;
      })
      .attr("cy", d => {
        const coords = projection([d.longitude, d.latitude]);
        return coords ? coords[1] : 0;
      })
      .attr("r", 4)
      .attr("fill", "#FFD700")
      .attr("opacity", 0.9)
      .attr("stroke", "white")
      .attr("stroke-width", 1)
      .on("mousemove", (event, d) => {
        tooltip
          .style("opacity", 1)
          .style("left", (event.pageX + 10) + "px")
          .style("top", (event.pageY - 25) + "px")
          .html(`${d.city}<br/>${d.exchange}`);
      })
      .on("mouseout", () => tooltip.style("opacity", 0));

    // Start rotation animation
    d3.timer(() => {
      rotation = (rotation + 0.3) % 360;
      projection.rotate([rotation, -20]);
      
      // Update land paths
      svg.selectAll("path.land").attr("d", path);
      
      // Update graticule
      svg.select(".graticule").attr("d", path(graticule));
      
      // Update city dots with 3D depth effect
      svg.selectAll(".city-dot")
        .attr("cx", d => {
          const coords = projection([d.longitude, d.latitude]);
          return coords ? coords[0] : 0;
        })
        .attr("cy", d => {
          const coords = projection([d.longitude, d.latitude]);
          return coords ? coords[1] : 0;
        })
        .attr("opacity", d => {
          // Get current rotation
          const currentRotation = projection.rotate();
          // Apply inverse rotation to get point in globe coordinates
          const rotated = d3.geoRotation(currentRotation);
          const point = rotated([d.longitude, d.latitude]);
          
          // Calculate visibility based on hemisphere position
          // cos(latitude) * cos(longitude) gives us depth cue
          const depth = Math.cos(point[1] * Math.PI / 180) * Math.cos(point[0] * Math.PI / 180);
          
          // Fade from fully opaque (1) to invisible (0) as point goes to back
          // Only show points on front hemisphere
          return Math.max(0, depth);
        })
        .style("pointer-events", d => {
          const currentRotation = projection.rotate();
          const rotated = d3.geoRotation(currentRotation);
          const point = rotated([d.longitude, d.latitude]);
          const depth = Math.cos(point[1] * Math.PI / 180) * Math.cos(point[0] * Math.PI / 180);
          
          // Disable pointer events for back hemisphere points
          return depth < 0.05 ? "none" : "auto";
        });
    });
  });
</script>
</body>
</html>
